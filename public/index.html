<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加载中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
        }

        /* 桌面端：灰色背景 + 白卡片居中 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
        }
        .container {
            flex-grow: 0;
            flex-shrink: 0;
            width: 760px;
            max-width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 32px;
            display: flex;
            gap: 32px;
        }
        .section { flex: 1; min-width: 0; }
        .section + .section {
            padding-left: 32px;
            border-left: 1px solid #e8e8e8;
        }

        /* 手机端：无背景无卡片，顶部对齐，禁止滚动 */
        @media (max-width: 640px) {
            html, body { overflow: hidden; }
            body {
                display: block;
                background: none;
                padding: 28px 20px 16px;
            }
            .container {
                display: block;
                width: 100%;
                background: none;
                border-radius: 0;
                box-shadow: none;
                padding: 0;
            }
            .section + .section {
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid #e8e8e8;
                padding-left: 0;
                border-left: none;
            }
            /* 手机端保持 16px 防止 iOS 输入框自动缩放 */
            .form-group input { font-size: 16px; }
        }
        .account-info {
            font-size: 15px;
            color: #666;
            margin-bottom: 12px;
        }
        .account-info strong { color: #333; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .section-desc { font-size: 14px; color: #999; margin-bottom: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: #333; margin-bottom: 4px; }
        .input-wrapper { position: relative; }
        .form-group input {
            width: 100%;
            padding: 10px 50px 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-group input:focus { border-color: #1890ff; }
        .form-group input:disabled { background-color: #f5f5f5; color: #999; }
        .form-group input.error { border-color: #ff4d4f; }
        .form-group input.success { border-color: #52c41a; }
        .toggle-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 13px;
            padding: 2px 6px;
        }
        .copy-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .copy-btn.copied { background-color: #f6ffed; border-color: #b7eb8f; color: #52c41a; }
        .btn {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background-color: #1890ff; color: white; }
        .btn-primary:disabled { background-color: #d9d9d9; cursor: not-allowed; }
        .btn-outline { background-color: white; border: 1px solid #d9d9d9; color: #333; }
        .alert { padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
        .alert-error { background-color: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .alert-success { background-color: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .result-group { display: flex; gap: 8px; align-items: center; }
        .result-group .input-wrapper { flex: 1; min-width: 0; }
        .query-result { margin-top: 16px; }
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1890ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading p { margin-top: 16px; color: #666; }
        .error-page { text-align: center; padding: 48px 24px; }
        .error-page h2 { color: #ff4d4f; margin-bottom: 8px; }
        .error-page p { color: #666; font-size: 14px; }
        .hint { margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 6px; font-size: 12px; color: #999; }
        .update-time { font-size: 12px; color: #999; margin-top: 6px; }
        .validation-msg { font-size: 12px; margin-top: 3px; }
        .validation-msg.error { color: #ff4d4f; }
        .validation-msg.success { color: #52c41a; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.26.js"></script>

    <script>
        const API_BASE = '/pas';

        let currentUser = null;

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 检测是否在飞书环境中
        function isFeishuEnvironment() {
            // 检查 User Agent 或特定环境标识
            const ua = navigator.userAgent.toLowerCase();
            return ua.includes('lark') || ua.includes('feishu');
        }

        // 等待 JSSDK 加载
        function waitForSDK(maxWait = 3000) {
            return new Promise((resolve) => {
                const startTime = Date.now();
                const check = () => {
                    if (window.h5sdk && window.tt) {
                        resolve(true);
                    } else if (Date.now() - startTime < maxWait) {
                        setTimeout(check, 100);
                    } else {
                        resolve(false);
                    }
                };
                check();
            });
        }

        // 获取飞书用户信息
        async function getFeishuUser() {
            // 先快速检查是否在飞书环境中
            if (!isFeishuEnvironment()) {
                throw new Error('请在飞书应用内打开本页面');
            }

            const sdkReady = await waitForSDK();

            if (!sdkReady) {
                throw new Error('请在飞书应用内打开本页面');
            }

            const appidRes = await fetch(API_BASE + '/api/feishu/appid');
            const appidData = await appidRes.json();

            if (!appidData.appid) {
                throw new Error('无法获取应用ID');
            }

            const code = await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    reject(new Error('授权超时，请刷新页面重试'));
                }, 10000);

                window.h5sdk.ready(() => {
                    window.tt.requestAccess({
                        appID: appidData.appid,
                        scopeList: [],
                        success: (res) => {
                            clearTimeout(timeout);
                            resolve(res.code);
                        },
                        fail: (err) => {
                            clearTimeout(timeout);
                            reject(new Error('授权失败，请稍后重试，如还有问题请联系IT'));
                        }
                    });
                });
                window.h5sdk.error((err) => {
                    clearTimeout(timeout);
                    reject(new Error('SDK 初始化失败'));
                });
            });

            const userRes = await fetch(API_BASE + '/api/feishu/user?code=' + code);
            const userData = await userRes.json();

            if (!userData.success) {
                throw new Error(userData.error || '获取用户信息失败');
            }

            return userData.data;
        }

        function showError(message) {
            document.getElementById('app').innerHTML = '<div class="container" style="justify-content:center;align-items:center;"><div class="error-page"><h2>出错了</h2><p>' + escapeHtml(message) + '</p></div></div>';
        }

        // 验证密码复杂度
        function validatePassword(password) {
            const errors = [];

            if (password.length < 8) {
                errors.push("密码长度至少8位");
            }

            let categories = 0;
            if (/[A-Z]/.test(password)) categories++;
            if (/[a-z]/.test(password)) categories++;
            if (/[0-9]/.test(password)) categories++;
            if (/[^A-Za-z0-9]/.test(password)) categories++;

            if (categories < 3) {
                errors.push("需包含至少3种：大写字母、小写字母、数字、特殊字符");
            }

            return {
                valid: errors.length === 0,
                message: errors.length > 0 ? errors.join("；") : "密码格式正确"
            };
        }

        // 更新密码验证状态
        function updatePasswordStatus(inputId, hintId) {
            const input = document.getElementById(inputId);
            const hint = document.getElementById(hintId);
            const value = input.value;

            if (!value) {
                input.classList.remove('error', 'success');
                hint.textContent = '';
                return false;
            }

            const result = validatePassword(value);
            hint.textContent = result.message;

            if (result.valid) {
                input.classList.remove('error');
                input.classList.add('success');
                hint.classList.remove('error');
                hint.classList.add('success');
            } else {
                input.classList.remove('success');
                input.classList.add('error');
                hint.classList.remove('success');
                hint.classList.add('error');
            }

            return result.valid;
        }

        // 更新确认密码状态
        function updateConfirmStatus() {
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const hint = document.getElementById('confirm-hint');
            const input = document.getElementById('confirm-password');

            if (!confirmPwd) {
                input.classList.remove('error', 'success');
                hint.textContent = '';
                return false;
            }

            // 检查两次密码是否一致
            if (confirmPwd !== newPwd) {
                hint.textContent = '密码不一致';
                hint.classList.remove('success');
                hint.classList.add('error');
                input.classList.remove('success');
                input.classList.add('error');
                return false;
            } else {
                hint.textContent = '密码一致';
                hint.classList.remove('error');
                hint.classList.add('success');
                input.classList.remove('error');
                input.classList.add('success');
                return true;
            }
        }

        function showHome(user) {
            currentUser = user;

            // AD 用户名（从邮箱提取）
            const adUsername = user.email ? user.email.split('@')[0] : '';

            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="section">
                        <div class="section-title">重置密码</div>
                        <div class="section-desc">请确认账号为邮箱前缀，与WiFi：Source-Unifi 登录账号相同，如有问题请联系王晨</div>
                        <div id="reset-alert"></div>
                        <form id="reset-form">
                            <div class="account-info">账号：<strong id="ad-username"></strong></div>
                            <div class="form-group">
                                <label>新密码</label>
                                <div class="input-wrapper">
                                    <input type="password" id="new-password" placeholder="请输入新密码" autocomplete="new-password">
                                    <button type="button" class="toggle-btn" data-target="new-password">显示</button>
                                </div>
                                <div class="validation-msg" id="new-hint"></div>
                            </div>
                            <div class="form-group">
                                <label>确认密码</label>
                                <div class="input-wrapper">
                                    <input type="password" id="confirm-password" placeholder="请再次输入新密码" autocomplete="new-password">
                                    <button type="button" class="toggle-btn" data-target="confirm-password">显示</button>
                                </div>
                                <div class="validation-msg" id="confirm-hint"></div>
                            </div>
                            <button type="submit" class="btn btn-primary" id="reset-btn" disabled>重置密码</button>
                        </form>
                    </div>

                    <div class="section">
                        <div class="section-title">查询密码</div>
                        <div class="section-desc">查询你的密码</div>
                        <button class="btn btn-outline" id="query-btn">查询密码</button>
                        <div id="query-result"></div>
                    </div>
                </div>
            `;

            document.getElementById('ad-username').textContent = adUsername || '未获取到';

            if (!adUsername) {
                document.getElementById('reset-alert').innerHTML =
                    '<div class="alert alert-error">未能获取邮箱前缀</div>';
                document.getElementById('reset-btn').disabled = true;
                document.getElementById('new-password').disabled = true;
                document.getElementById('confirm-password').disabled = true;
                document.getElementById('query-btn').disabled = true;
            }

            // 绑定密码显示/隐藏按钮事件
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    togglePassword(targetId);
                });
            });

            // 绑定密码输入事件
            document.getElementById('new-password').addEventListener('input', function() {
                updatePasswordStatus('new-password', 'new-hint');
                updateConfirmStatus();
                updateResetButton();
            });

            document.getElementById('confirm-password').addEventListener('input', function() {
                updateConfirmStatus();
                updateResetButton();
            });

            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await resetPassword();
            });

            document.getElementById('query-btn').addEventListener('click', queryPassword);
        }

        // 更新重置按钮状态（优化：避免重复调用）
        function updateResetButton() {
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const btn = document.getElementById('reset-btn');

            const isNewValid = validatePassword(newPwd).valid;
            const isConfirmMatch = newPwd && confirmPwd && newPwd === confirmPwd;

            btn.disabled = !(newPwd && confirmPwd && isNewValid && isConfirmMatch);
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;

            const btn = input.parentElement.querySelector('.toggle-btn');

            if (input.type === 'password') {
                input.type = 'text';
                if (btn) btn.textContent = '隐藏';
            } else {
                input.type = 'password';
                if (btn) btn.textContent = '显示';
            }
        }

        async function resetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('reset-btn');
            const alertEl = document.getElementById('reset-alert');

            alertEl.innerHTML = '';

            if (!newPassword || !confirmPassword) {
                alertEl.innerHTML = '<div class="alert alert-error">请填写所有字段</div>';
                return;
            }

            if (newPassword !== confirmPassword) {
                alertEl.innerHTML = '<div class="alert alert-error">两次输入的密码不一致</div>';
                return;
            }

            // 验证密码复杂度
            const validation = validatePassword(newPassword);
            if (!validation.valid) {
                alertEl.innerHTML = '<div class="alert alert-error">' + escapeHtml(validation.message) + '</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = '处理中...';

            try {
                const res = await fetch(API_BASE + '/api/ad/password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        newPassword,
                        confirmPassword,
                        user_id: currentUser.user_id,
                        user_name: currentUser.name,
                        email: currentUser.email
                    })
                });

                const data = await res.json();

                if (data.success) {
                    alertEl.innerHTML = '<div class="alert alert-success">密码重置成功</div>';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                    document.getElementById('new-hint').textContent = '';
                    document.getElementById('confirm-hint').textContent = '';
                    document.getElementById('new-password').classList.remove('success', 'error');
                    document.getElementById('confirm-password').classList.remove('success', 'error');
                    document.getElementById('query-result').innerHTML = '';
                } else {
                    alertEl.innerHTML = '<div class="alert alert-error">' + escapeHtml(data.error) + '</div>';
                }
            } catch (err) {
                alertEl.innerHTML = '<div class="alert alert-error">请求失败，请稍后重试</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = '重置密码';
                updateResetButton();
            }
        }

        async function queryPassword() {
            const btn = document.getElementById('query-btn');
            const resultDiv = document.getElementById('query-result');

            btn.disabled = true;
            btn.textContent = '查询中...';
            resultDiv.innerHTML = '';

            try {
                const userAccount = currentUser.email ? currentUser.email.split('@')[0] : '';
                const res = await fetch(API_BASE + '/api/ad/password/query?user_id=' + encodeURIComponent(currentUser.user_id) + '&user_account=' + encodeURIComponent(userAccount));
                const data = await res.json();

                if (data.success && data.data) {
                    const p = data.data;
                    resultDiv.innerHTML = `
                        <div class="query-result">
                            <div class="form-group">
                                <label>已存储的密码</label>
                                <div class="result-group">
                                    <div class="input-wrapper">
                                        <input type="password" id="query-password" readonly>
                                        <button type="button" class="toggle-btn" id="toggle-query-btn">显示</button>
                                    </div>
                                    <button type="button" class="copy-btn" id="copy-btn">复制</button>
                                </div>
                            </div>
                            <div class="update-time" id="update-time"></div>
                        </div>
                    `;
                    document.getElementById('query-password').value = p.password;
                    document.getElementById('update-time').textContent = '最后重置时间：' + new Date(p.updatedAt).toLocaleString('zh-CN');

                    // 绑定事件监听器
                    document.getElementById('toggle-query-btn').addEventListener('click', function() {
                        togglePassword('query-password');
                    });
                    document.getElementById('copy-btn').addEventListener('click', copyPassword);
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-error">' + escapeHtml(data.error || '请在本页面重置密码后再查询') + '</div>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<div class="alert alert-error">查询失败，请稍后重试</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = '查询密码';
            }
        }

        async function copyPassword() {
            const input = document.getElementById('query-password');
            const btn = document.getElementById('copy-btn');

            if (!input || !btn) {
                console.error('找不到密码输入框或复制按钮');
                return;
            }

            try {
                // 优先使用现代 Clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(input.value);
                } else {
                    // 降级方案：创建临时 textarea 避免选中输入框
                    const textarea = document.createElement('textarea');
                    textarea.value = input.value;
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                }

                const originalText = btn.textContent;
                btn.textContent = '已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制');
            }
        }

        async function init() {
            try {
                const user = await getFeishuUser();
                // 验证成功后才设置标题
                document.title = 'AD 密码管理';
                showHome(user);
            } catch (err) {
                console.error('初始化失败:', err);
                // 验证失败时设置标题为"出错了"
                document.title = '出错了';
                showError(err.message);
            }
        }

        init();
    </script>
</body>
</html>
